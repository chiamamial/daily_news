name: Vibe Coding Daily

on:
  schedule:
    - cron: "0 7 * * 1-5"  # 7:00 UTC = 9:00 Italia (CEST), lunedì-venerdì
  workflow_dispatch:         # trigger manuale dalla UI di GitHub

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright + Chromium
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Generate and send
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python main.py

      - name: Upload PDF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vibe-coding-daily-${{ github.run_id }}
          path: /tmp/vibe_coding_daily.pdf
          retention-days: 14
          if-no-files-found: ignore
